# PHASER server deployment
#
# First run:   cp .env.example .env && docker compose pull && docker compose up -d
# Update:      docker compose pull && docker compose up -d
# Build image locally (dev/CI only): docker compose up --build -d

x-phaser-runtime: &phaser-runtime
  PHASER_HOST: ${PHASER_HOST:-0.0.0.0}
  PHASER_PORT: ${PHASER_PORT:-8765}
  PHASER_MAX_WORKERS: ${PHASER_MAX_WORKERS:-8}
  PHASER_MAX_CONCURRENT_JOBS: ${PHASER_MAX_CONCURRENT_JOBS:-1}
  PHASER_ADAPTIVE_REFINE_FACTOR: ${PHASER_ADAPTIVE_REFINE_FACTOR:-5}
  PHASER_MAX_ADAPTIVE_POINTS: ${PHASER_MAX_ADAPTIVE_POINTS:-120000}
  PHASER_JOB_RESULT_TTL_SEC: ${PHASER_JOB_RESULT_TTL_SEC:-3600}
  PHASER_JOB_QUEUE_TTL_SEC: ${PHASER_JOB_QUEUE_TTL_SEC:-7200}
  PHASER_JOB_REAPER_INTERVAL_SEC: ${PHASER_JOB_REAPER_INTERVAL_SEC:-60}
  PHASER_JOB_WALL_TIMEOUT_SEC: ${PHASER_JOB_WALL_TIMEOUT_SEC:-300}
  PHASER_IPHREEQC_LIB: ${PHASER_IPHREEQC_LIB:-/usr/local/lib/libiphreeqc.so}
  PHASER_BUILTIN_DB_DIRS: ${PHASER_BUILTIN_DB_DIRS:-/opt/phreeqc/database}
  PHASER_GENERATED_DB_DIR: ${PHASER_GENERATED_DB_DIR:-/app/PHASER/data/databases/generated}
  PHASER_DEFAULT_DB_ID: ${PHASER_DEFAULT_DB_ID:-}
  PHASER_CATALOG_DB: ${PHASER_CATALOG_DB:-/app/PHASER/data/catalog.sqlite}
  PHASER_STATS_DB: ${PHASER_STATS_DB:-/app/PHASER/data/stats.sqlite}
  PHASER_RATE_LIMIT: ${PHASER_RATE_LIMIT:-1}
  PHASER_RATE_LIMIT_WINDOW_SEC: ${PHASER_RATE_LIMIT_WINDOW_SEC:-60}
  PHASER_RATE_LIMIT_API_PER_MIN: ${PHASER_RATE_LIMIT_API_PER_MIN:-600}
  PHASER_RATE_LIMIT_COMPUTE_PER_MIN: ${PHASER_RATE_LIMIT_COMPUTE_PER_MIN:-12}
  PHASER_RATE_LIMIT_COMPUTE_COOLDOWN_SEC: ${PHASER_RATE_LIMIT_COMPUTE_COOLDOWN_SEC:-600}
  PHASER_RATE_LIMIT_DB_REGISTER_PER_MIN: ${PHASER_RATE_LIMIT_DB_REGISTER_PER_MIN:-6}
  PHASER_RATE_LIMIT_DB_REGISTER_COOLDOWN_SEC: ${PHASER_RATE_LIMIT_DB_REGISTER_COOLDOWN_SEC:-300}
  PHASER_RATE_LIMIT_PHASES_PER_MIN: ${PHASER_RATE_LIMIT_PHASES_PER_MIN:-60}
  PHASER_RATE_LIMIT_COOLDOWN_ESCALATE: ${PHASER_RATE_LIMIT_COOLDOWN_ESCALATE:-1}
  PHASER_RATE_LIMIT_COOLDOWN_MAX_SEC: ${PHASER_RATE_LIMIT_COOLDOWN_MAX_SEC:-3600}
  PHASER_RATE_LIMIT_VIOLATION_RESET_SEC: ${PHASER_RATE_LIMIT_VIOLATION_RESET_SEC:-86400}

services:
  phaser:
    image: ghcr.io/matteo-loche/phaser:latest
    build:
      context: .
      args:
        PYTHON_VERSION: "3.13-slim"
        IPHREEQC_VERSION: "3.8.6-17100"
    environment:
      <<: *phaser-runtime
    ports:
      - "${PHASER_PORT:-8765}:8765"
    volumes:
      - ${PHASER_DATA_DIR:-./data/databases/generated}:/app/PHASER/data/databases/generated
    deploy:
      resources:
        limits:
          cpus: "${PHASER_CPU_LIMIT:-8}"
          memory: ${PHASER_MEMORY_LIMIT:-8G}
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - phaser
    restart: unless-stopped
    profiles:
      - tunnel

  watchtower:
    image: containrrr/watchtower:latest
    command: --interval ${WATCHTOWER_INTERVAL:-3600} --cleanup
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    profiles:
      - watchtower
