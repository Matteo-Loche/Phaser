<svg xmlns="http://www.w3.org/2000/svg" viewBox="76 48 648 122" width="648" height="122">
  <title>PHASER logo</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');

      @keyframes barOn {
        0%   { opacity: 0; filter: blur(0px) brightness(1); }
        5%   { opacity: 1; filter: blur(4px) brightness(3); }
        18%  { opacity: 1; filter: blur(1px) brightness(2); }
        65%  { opacity: 1; filter: blur(0px) brightness(1); }
        80%  { opacity: 1; filter: blur(0px) brightness(1); }
        95%  { opacity: 0; }
        100% { opacity: 0; }
      }

      .b12 { animation: barOn 2.2s ease-in-out infinite; animation-delay: 0.00s; animation-play-state: paused; }
      .b11 { animation: barOn 2.2s ease-in-out infinite; animation-delay: 0.10s; animation-play-state: paused; }
      .b10 { animation: barOn 2.2s ease-in-out infinite; animation-delay: 0.20s; animation-play-state: paused; }
      .b9  { animation: barOn 2.2s ease-in-out infinite; animation-delay: 0.30s; animation-play-state: paused; }
      .b8  { animation: barOn 2.2s ease-in-out infinite; animation-delay: 0.40s; animation-play-state: paused; }
      .b7  { animation: barOn 2.2s ease-in-out infinite; animation-delay: 0.50s; animation-play-state: paused; }
      .b6  { animation: barOn 2.2s ease-in-out infinite; animation-delay: 0.60s; animation-play-state: paused; }
      .b5  { animation: barOn 2.2s ease-in-out infinite; animation-delay: 0.70s; animation-play-state: paused; }
      .b4  { animation: barOn 2.2s ease-in-out infinite; animation-delay: 0.80s; animation-play-state: paused; }
      .b3  { animation: barOn 2.2s ease-in-out infinite; animation-delay: 0.90s; animation-play-state: paused; }
      .b2  { animation: barOn 2.2s ease-in-out infinite; animation-delay: 1.00s; animation-play-state: paused; }
      .b1  { animation: barOn 2.2s ease-in-out infinite; animation-delay: 1.10s; animation-play-state: paused; }
      .b12, .b11, .b10, .b9, .b8, .b7, .b6, .b5, .b4, .b3, .b2, .b1 { opacity: 0; }
    </style>

    <mask id="txt">
      <rect x="0" y="0" width="800" height="200" fill="black"/>
      <text x="400" y="162"
        font-family="'Orbitron','Arial Black',monospace"
        font-size="128" font-weight="900"
        text-anchor="middle"
        letter-spacing="4"
        fill="white"
        transform="skewX(-12) translate(30,0)">PHASER</text>
    </mask>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="200" fill="#03040A"/>

  <!-- Ghost outline -->
  <text x="400" y="162"
    font-family="'Orbitron','Arial Black',monospace"
    font-size="128" font-weight="900"
    text-anchor="middle" letter-spacing="4"
    fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.06"
    transform="skewX(-12) translate(30,0)">PHASER</text>

  <g mask="url(#txt)" filter="url(#glow)">
    <rect x="0" y="0" width="800" height="200" fill="#03040A"/>
    <polygon class="b1"  points="0,2   800,2   760,13  0,13"  fill="#F0E6FF"/>
    <polygon class="b2"  points="0,19  800,19  760,30  0,30"  fill="#BF00FF"/>
    <polygon class="b3"  points="0,36  800,36  760,47  0,47"  fill="#4B0FFF"/>
    <polygon class="b4"  points="0,53  800,53  760,64  0,64"  fill="#0066FF"/>
    <polygon class="b5"  points="0,70  800,70  760,81  0,81"  fill="#00DDFF"/>
    <polygon class="b6"  points="0,87  800,87  760,98  0,98"  fill="#00FFB2"/>
    <polygon class="b7"  points="0,104 800,104 760,115 0,115" fill="#39FF14"/>
    <polygon class="b8"  points="0,121 800,121 760,132 0,132" fill="#FFE600"/>
    <polygon class="b9"  points="0,138 800,138 760,149 0,149" fill="#FF9900"/>
    <polygon class="b10" points="0,155 800,155 760,166 0,166" fill="#FF4D00"/>
    <polygon class="b11" points="0,172 800,172 760,183 0,183" fill="#FF0033"/>
    <polygon class="b12" points="0,189 800,189 760,200 0,200" fill="#CC0077"/>
  </g>
</svg>
