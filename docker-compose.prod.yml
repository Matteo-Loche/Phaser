# Production compose file: runs PHASER from the PRE-BUILT image on GHCR
# instead of building from source. Use this on a server.
#
# First run:           docker compose -f docker-compose.prod.yml up -d
# Update to newest:    docker compose -f docker-compose.prod.yml pull
#                      docker compose -f docker-compose.prod.yml up -d
#
# (The plain docker-compose.yml is still used for LOCAL development, where it
#  builds the image from your source code.)
services:
  phaser:
    image: ghcr.io/matteo-loche/phaser:latest
    environment:
      PHASER_HOST: ${PHASER_HOST:-0.0.0.0}
      PHASER_PORT: ${PHASER_PORT:-8765}
      PHASER_IPHREEQC_LIB: ${PHASER_IPHREEQC_LIB:-/usr/local/lib/libiphreeqc.so}
      PHASER_BUILTIN_DB_DIRS: ${PHASER_BUILTIN_DB_DIRS:-/opt/phreeqc/database}
      PHASER_GENERATED_DB_DIR: ${PHASER_GENERATED_DB_DIR:-/app/PHASER/data/databases/generated}
      PHASER_DEFAULT_DB_ID: ${PHASER_DEFAULT_DB_ID:-}
    ports:
      - "${PHASER_PORT:-8765}:8765"
    volumes:
      # Host side defaults to a folder next to this file. On a server/NAS with a
      # dedicated dataset, set PHASER_DATA_DIR in a .env file, e.g.
      #   PHASER_DATA_DIR=/mnt/pool/phaser/generated
      - ${PHASER_DATA_DIR:-./data/databases/generated}:/app/PHASER/data/databases/generated
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - phaser
    restart: unless-stopped
    profiles:
      - tunnel

  # OPTIONAL auto-updater. With this running, the server checks GHCR every
  # 5 minutes and, when a newer `latest` image exists, pulls it and restarts
  # PHASER automatically — so you never have to run `pull` by hand.
  # Enable it by adding `--profile watchtower` to your compose command.
  watchtower:
    image: containrrr/watchtower:latest
    command: --interval 86400 --cleanup
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    profiles:
      - watchtower
